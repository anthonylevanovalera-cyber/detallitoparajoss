<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Joselyn R.R</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; background-color: #050505; overflow: hidden; font-family: 'Georgia', serif; }
        #escena1, #escena2 { position: absolute; width: 100%; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 1.5s ease; }
        #escena2 { opacity: 0; pointer-events: none; z-index: 2; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #frase-sol { position: absolute; bottom: 15%; color: #fff; text-align: center; text-shadow: 0 0 10px #ffeb3b, 0 0 20px #ffeb3b; font-size: 1.3rem; padding: 0 25px; z-index: 5; font-family: 'Dancing Script', cursive; }
        .flecha-continuar { position: absolute; top: 10%; cursor: pointer; z-index: 10; animation: bounce 2s infinite; display: none; text-align: center; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-15px);} }
        .pergamino-contenedor { width: 85%; max-width: 500px; height: 0; background-color: #e4d5b7; background-image: url('papel.jpg'); background-size: cover; background-position: center; box-shadow: 0 0 60px rgba(0,0,0,0.9); overflow-y: auto; transition: height 2.5s ease-in-out; display: flex; flex-direction: column; border-radius: 5px; }
        .abierto { height: 80vh; padding: 60px 40px; }
        .texto-carta { color: #2d1b0d; line-height: 1.8; font-family: 'Dancing Script', cursive; font-size: 1.45rem; text-align: center; opacity: 0; transition: opacity 1s; padding: 10px; white-space: pre-wrap; }
        .boton-iniciar { padding: 15px 35px; background: #ffeb3b; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 0 20px rgba(255, 235, 59, 0.4); z-index: 100; position: relative; }
    </style>
</head>
<body>

    <div id="escena1">
        <button class="boton-iniciar" id="btnPlay">Toca aquí para tu sorpresa ✨</button>
        <div class="flecha-continuar" id="flecha">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#ffeb3b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
            <p style="color: #ffeb3b; font-family: 'Dancing Script', cursive; font-size: 1.1rem; margin-top: 5px;">Ábreme...</p>
        </div>
        <canvas id="flowerCanvas"></canvas>
        <div id="frase-sol">Tus ojitos marrones son como el mismo sol, iluminan los días más grises.</div>
    </div>

    <div id="escena2">
        <div class="pergamino-contenedor" id="pergamino">
            <div class="texto-carta" id="contenidoCarta"></div>
        </div>
    </div>

    <audio id="musica" src="musica.mp3" loop preload="auto"></audio>

    <script>
        const canvas = document.getElementById('flowerCanvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('btnPlay');
        const flecha = document.getElementById('flecha');
        const escena1 = document.getElementById('escena1');
        const escena2 = document.getElementById('escena2');
        const pergamino = document.getElementById('pergamino');
        const contenidoCarta = document.getElementById('contenidoCarta');
        const audio = document.getElementById('musica');

        const textoDedicatoria = `Joselyn, desde el día que te conocí fue algo magnífico. Me encanta tu sonrisa, tus ojos, la manera en la que piensas y, genuinamente, todo tu ser.

El camino es largo y es tedioso, pero quiero que sepas que estoy dispuesto a recorrer todo ese camino para llegar a tener algo lindo contigo. Eres una persona especial para mí y lo reconozco: caí rendido ante ti. Bajé mi espada y mi escudo para poder abrazarte y abrirme hacia ti.

Estaré dispuesto a caminar a tu lado y, si caemos, nos levantamos; de ello se trata: apoyarnos y crecer juntos. Eres el sol que ilumina los días y la luna que alumbra el camino de noche. Cada día me doy cuenta de lo afortunado que soy al tenerte en mi vida. Gracias por ser esa persona especial que me motiva, por compartir tus días conmigo y hacerme increíblemente feliz.

Te quiero, Joselyn R.R. ♥

Atte: Genek.`;

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let flowers = [];

        class Flower {
            constructor(x, y, size) {
                this.x = x; this.y = y; this.size = size;
                this.growth = 0;
            }
            draw() {
                if (this.growth < 1) this.growth += 0.005; 
                const s = this.size * this.growth;
                ctx.strokeStyle = '#4caf50'; ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(this.x, canvas.height);
                ctx.quadraticCurveTo(this.x + 20, this.y + (canvas.height - this.y)/2, this.x, this.y);
                ctx.stroke();
                ctx.shadowBlur = 15; ctx.shadowColor = '#fff700';
                for (let i = 0; i < 8; i++) {
                    const a = (i * 2 * Math.PI) / 8;
                    ctx.fillStyle = '#ffeb3b';
                    ctx.beginPath();
                    ctx.arc(this.x + Math.cos(a) * s, this.y + Math.sin(a) * s, s/2, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.shadowBlur = 0; ctx.fillStyle = '#3e2723';
                ctx.beginPath(); ctx.arc(this.x, this.y, s/3, 0, Math.PI * 2); ctx.fill();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            flowers.forEach(f => f.draw());
            requestAnimationFrame(animate);
        }

        function escribirCarta(elemento, texto, i = 0) {
            if (i < texto.length) {
                elemento.innerHTML += texto.charAt(i) === '\n' ? '<br>' : texto.charAt(i);
                setTimeout(() => escribirCarta(elemento, texto, i + 1), 65);
            }
        }

        // Lógica de inicio robusta
        btn.onclick = function() {
            btn.style.display = 'none';
            
            // Intento de audio que no bloquea el resto del código
            audio.play().catch(e => console.log("Audio bloqueado por el navegador"));

            for(let i=0; i<5; i++) {
                setTimeout(() => {
                    flowers.push(new Flower((canvas.width/6)*(i+1), canvas.height*0.55, 30));
                    if(i === 4) setTimeout(() => { flecha.style.display = 'block'; }, 4500);
                }, i * 1500); 
            }
            animate();
        };

        flecha.onclick = function() {
            escena1.style.opacity = '0';
            setTimeout(() => {
                escena1.style.display = 'none';
                escena2.style.opacity = '1';
                escena2.style.pointerEvents = 'all';
                setTimeout(() => {
                    pergamino.classList.add('abierto');
                    setTimeout(() => { 
                        contenidoCarta.style.opacity = '1';
                        escribirCarta(contenidoCarta, textoDedicatoria);
                    }, 2500);
                }, 600);
            }, 1500);
        };

        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    </script>
</body>
</html>
