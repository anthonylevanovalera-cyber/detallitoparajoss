<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Joselyn</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0a0a0a; font-family: 'Playfair Display', serif; }
        #escena1, #escena2 { position: absolute; width: 100%; height: 100%; transition: opacity 1.5s ease; }
        #escena2 { 
            display: none; 
            opacity: 0; 
            background: url('papel.jpg') no-repeat center center; 
            background-size: cover; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .boton-iniciar { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 15px 30px; font-size: 1.2rem; background-color: #ffeb3b; border: none; border-radius: 50px; cursor: pointer; z-index: 10; font-family: 'Dancing Script', cursive; box-shadow: 0 0 20px rgba(255,235,59,0.5); }
        
        .pergamino-contenedor { 
            width: 85%; 
            max-width: 600px; 
            max-height: 80vh;
            overflow-y: auto;
            display: block;
            padding: 30px;
            scrollbar-width: none;
        }
        .pergamino-contenedor::-webkit-scrollbar { display: none; }

        .texto-carta { 
            font-family: 'Dancing Script', cursive; 
            font-size: 1.25rem; 
            line-height: 1.6; 
            white-space: pre-wrap; 
            opacity: 0; 
            transition: opacity 2s; 
            color: #3d2b1f;
            text-align: center;
            margin: 0 auto;
        }
        
        #flowerCanvas { width: 100%; height: 100%; }
        .flecha-continuar { display: none; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); cursor: pointer; text-align: center; z-index: 15; }
        #frase-sol { position: absolute; top: 15%; width: 100%; text-align: center; color: #ffeb3b; font-family: 'Dancing Script', cursive; font-size: 1.8rem; opacity: 0; transition: opacity 2s; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="escena1">
        <button class="boton-iniciar" id="btnPlay">Toca aquí para tu sorpresa ✨</button>
        <div id="frase-sol">Tus ojitos marrones son como el mismo sol Joselyn...</div>
        <div class="flecha-continuar" id="flecha">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#ffeb3b" stroke-width="2"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"/></svg>
            <p style="color: #ffeb3b; font-family: 'Dancing Script'; margin: 0;">Haz clic aquí para leer</p>
        </div>
        <canvas id="flowerCanvas"></canvas>
    </div>

    <div id="escena2">
        <div class="pergamino-contenedor">
            <div id="contenidoCarta" class="texto-carta"></div>
        </div>
    </div>

    <audio id="musica" src="musica.mp3?v=1.8" loop preload="auto"></audio>

    <script>
        const canvas = document.getElementById('flowerCanvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('btnPlay');
        const audio = document.getElementById('musica');
        const escena1 = document.getElementById('escena1');
        const escena2 = document.getElementById('escena2');
        const flecha = document.getElementById('flecha');
        const fraseSol = document.getElementById('frase-sol');
        const contenidoCarta = document.getElementById('contenidoCarta');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const textoDedicatoria = `Joselyn, desde el día que te conocí fue algo magnífico. Me encanta tu sonrisa, tus ojos, la manera en la que piensas y, genuinamente, todo tu ser.

El camino es largo y es tedioso, pero quiero que sepas que estoy dispuesto a recorrer todo ese camino para llegar a tener algo lindo contigo.

Eres una persona especial para mí y lo reconozco: caí rendido ante ti. Bajé mi espada y mi escudo para poder abrazarte y abrirme hacia ti. Estaré dispuesto a caminar a tu lado y, si caemos, nos levantamos; de ello se trata: apoyarnos y crecer juntos.

Eres el sol que ilumina los días y la luna que alumbra el camino de noche. Cada día me doy cuenta de lo afortunado que soy al tenerte en mi vida. Gracias por ser esa persona especial que me motiva, por compartir tus días conmigo y hacerme increíblemente feliz.

Te quiero, Joselyn R.R. ♥

Atte: Genek.`;

        class Flower {
            constructor(x) {
                this.x = x;
                this.growth = 0;
            }
            draw() {
                if(this.growth < 1) this.growth += 0.004;
                ctx.save();
                ctx.translate(this.x, canvas.height);
                ctx.scale(this.growth, this.growth);
                
                // --- AJUSTE: Contorno Brillante ---
                // Agregamos una sombra brillante para el contorno de toda la flor
                ctx.shadowColor = "rgba(255, 235, 59, 0.7)"; // Color amarillo brillante
                ctx.shadowBlur = 15; // Intensidad del brillo
                // ------------------------------------

                ctx.strokeStyle = "#2e7d32";
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(10, -canvas.height*0.2, 0, -canvas.height*0.45);
                ctx.stroke();

                ctx.fillStyle = "#2e7d32";
                ctx.beginPath(); ctx.ellipse(-10, -canvas.height*0.15, 10, 25, Math.PI/4, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(10, -canvas.height*0.25, 10, 25, -Math.PI/4, 0, Math.PI*2); ctx.fill();

                ctx.translate(0, -canvas.height*0.45);
                for(let i=0; i<12; i++) {
                    ctx.rotate(Math.PI/6);
                    ctx.fillStyle = "#fdd835";
                    
                    // --- AJUSTE: Contorno Brillante en los Pétalos ---
                    // Aplicamos la misma sombra brillante individualmente a cada pétalo
                    ctx.shadowColor = "rgba(255, 235, 59, 0.7)";
                    ctx.shadowBlur = 10;
                    // --------------------------------------------------

                    ctx.beginPath(); ctx.ellipse(0, 25, 10, 25, 0, 0, Math.PI*2); ctx.fill();
                }

                // --- AJUSTE: Desactivar sombra para el centro ---
                // Desactivamos la sombra antes de dibujar el centro marrón
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
                // --------------------------------------------------

                ctx.fillStyle = "#3e2723";
                ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI*2); ctx.fill();
                
                ctx.restore();
            }
        }

        let flowers = [];
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            flowers.forEach(f => f.draw());
            requestAnimationFrame(animate);
        }

        btn.onclick = function() {
            btn.style.display = 'none';
            audio.load();
            audio.play().catch(() => { audio.muted = false; audio.play(); });
            fraseSol.style.opacity = '1';

            for(let i=0; i<5; i++) {
                setTimeout(() => {
                    flowers.push(new Flower((canvas.width/6)*(i+1)));
                    if(i === 4) setTimeout(() => { flecha.style.display = 'block'; }, 8000);
                }, i * 2200); 
            }
            animate();
        };

        flecha.onclick = function() {
            escena1.style.opacity = '0';
            setTimeout(() => {
                escena1.style.display = 'none';
                escena2.style.display = 'flex';
                setTimeout(() => {
                    escena2.style.opacity = '1';
                    escribirCarta();
                }, 100);
            }, 1500);
        };

        function escribirCarta() {
            let i = 0;
            contenidoCarta.style.opacity = '1';
            function escribir() {
                if (i < textoDedicatoria.length) {
                    let char = textoDedicatoria.charAt(i);
                    contenidoCarta.innerHTML += char === '\n' ? '<br>' : char;
                    i++;
                    
                    const contenedor = document.querySelector('.pergamino-contenedor');
                    contenedor.scrollTop = contenedor.scrollHeight;

                    setTimeout(escribir, 45);
                }
            }
            escribir();
        }
    </script>
</body>
</html>
