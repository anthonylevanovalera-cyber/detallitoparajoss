<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Joselyn</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0a0a0a; font-family: 'Playfair Display', serif; }
        #escena1, #escena2 { position: absolute; width: 100%; height: 100%; transition: opacity 1.5s ease; }
        #escena2 { display: none; opacity: 0; background: url('papel.jpg') no-repeat center center; background-size: cover; display: flex; align-items: center; justify-content: center; }
        .boton-iniciar { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 15px 30px; font-size: 1.2rem; background-color: #ffeb3b; border: none; border-radius: 50px; cursor: pointer; z-index: 10; font-family: 'Dancing Script', cursive; box-shadow: 0 0 20px rgba(255,235,59,0.5); }
        .pergamino-contenedor { width: 80%; max-width: 600px; padding: 40px; text-align: center; color: #3d2b1f; }
        .texto-carta { font-family: 'Dancing Script', cursive; font-size: 1.6rem; line-height: 1.6; white-space: pre-wrap; opacity: 0; transition: opacity 2s; }
        #flowerCanvas { width: 100%; height: 100%; }
        .flecha-continuar { display: none; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); cursor: pointer; text-align: center; z-index: 15; }
    </style>
</head>
<body>

    <div id="escena1">
        <button class="boton-iniciar" id="btnPlay">Toca aquí para tu sorpresa ✨</button>
        <div class="flecha-continuar" id="flecha">
            <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#ffeb3b" stroke-width="2"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"/></svg>
            <p style="color: #ffeb3b; font-family: 'Dancing Script';">Haz clic aquí para leer</p>
        </div>
        <canvas id="flowerCanvas"></canvas>
    </div>

    <div id="escena2">
        <div class="pergamino-contenedor">
            <div class="texto-carta" id="contenidoCarta"></div>
        </div>
    </div>

    <audio id="musica" src="musica.mp3" preload="auto" loop></audio>

    <script>
        const canvas = document.getElementById('flowerCanvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('btnPlay');
        const audio = document.getElementById('musica');
        const escena1 = document.getElementById('escena1');
        const escena2 = document.getElementById('escena2');
        const contenidoCarta = document.getElementById('contenidoCarta');
        const flecha = document.getElementById('flecha');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const textoDedicatoria = `Joselyn, desde el día que te conocí fue algo magnífico. Me encanta tu sonrisa...

El camino es largo y es tedioso, pero quiero que sepas que estoy dispuesto a recorrer todo ese camino para llegar a ti. 

Estaré dispuesto a caminar a tu lado. Te quiero, Joselyn R.R. ♥

Atte: Genek.`;

        // INTENTO DE REPRODUCCIÓN AL HACER CLIC
        btn.onclick = function() {
            btn.style.display = 'none';
            
            // MÉTODO PARA FORZAR EL AUDIO
            audio.play().then(() => {
                console.log("Música sonando");
            }).catch(error => {
                console.log("Reintentando con mute...");
                audio.muted = false;
                audio.play();
            });

            iniciarFlores();
        };

        function iniciarFlores() {
            // Aquí va la lógica de los girasoles que ya tenías
            // (Para ahorrar espacio no pongo todo el código de dibujo, 
            // pero asegúrate de que el bloque de 'Flower' esté debajo)
            animate();
            setTimeout(() => { flecha.style.display = 'block'; }, 8000);
        }

        flecha.onclick = function() {
            escena1.style.opacity = '0';
            setTimeout(() => {
                escena1.style.display = 'none';
                escena2.style.display = 'flex';
                setTimeout(() => {
                    escena2.style.opacity = '1';
                    escribirTexto();
                }, 100);
            }, 1500);
        };

        function escribirTexto() {
            contenidoCarta.style.opacity = '1';
            let i = 0;
            function escribir() {
                if (i < textoDedicatoria.length) {
                    contenidoCarta.innerHTML += textoDedicatoria.charAt(i);
                    i++;
                    setTimeout(escribir, 60);
                }
            }
            escribir();
        }

        // --- CLASE FLOWER (Mantén tu código de los girasoles aquí) ---
        class Flower {
            constructor(x, y, size) {
                this.x = x; this.y = y; this.size = size; this.growth = 0;
            }
            draw() {
                if(this.growth < 1) this.growth += 0.01;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.growth, this.growth);
                // Dibujo del girasol...
                ctx.fillStyle = "yellow";
                for(let i=0; i<12; i++) {
                    ctx.rotate(Math.PI/6);
                    ctx.beginPath();
                    ctx.ellipse(0, 20, 8, 20, 0, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.fillStyle = "#3e2723";
                ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }
        }
        let flowers = [];
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(flowers.length === 0) {
                for(let i=0; i<5; i++) flowers.push(new Flower((canvas.width/6)*(i+1), canvas.height/2, 30));
            }
            flowers.forEach(f => f.draw());
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
